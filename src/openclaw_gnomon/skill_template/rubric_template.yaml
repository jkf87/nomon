# Nomon Rubric Template
# 평가-중심 하네스: spec → rubric → verifier → writer
# 이 파일을 작성하고 /nomon:rubric check rubric.yaml 로 검증하세요.

task:
  name: "Your task name"
  description: "What you want to build or create"
  goal_persona: "누가 어떤 맥락에서 사용하는가?"
  success_signal: "성공의 신호는 무엇인가?"

# Rubric items: 각 항목은 평가의 한 차원
# label은 반드시 3가지 중 하나: quantitative / persona-llm / human
# quantitative가 전체의 30% 이상이어야 함 (LLM-only 방지)

rubric:
  # 예시 1: 정량 신호 (코드로 자동 측정)
  - id: "design-contrast"
    description: "텍스트-배경 색상 대비비가 WCAG AA 기준 충족"
    label: "quantitative"
    measure:
      kind: "wcag_contrast"
      level: "AA"  # AA=4.5:1, AAA=7:1
    weight: 1.0

  # 예시 2: 페르소나-LLM (LLM이지만 페르소나로 ground)
  - id: "readability"
    description: "페르소나가 5초에 핵심 요약 가능한가?"
    label: "persona-llm"
    measure:
      kind: "persona_judge"
      persona_ref: "task.goal_persona"
      prompt: "당신은 {persona}입니다. 이 결과물을 읽고 5초 안에 핵심을 1줄로 요약할 수 있나요? PASS 또는 FAIL로 답하세요."
    weight: 0.7

  # 예시 3: 사람 평가 (taste residue 20%)
  - id: "overall-quality"
    description: "종합적인 만족도 (0-5점)"
    label: "human"
    measure:
      kind: "human_score"
      sample_n: 5
      scale: 0..5
    weight: 1.5

# 메타 검증: rubric 자체가 좋은지 확인
# 매 N번 실행 후 사람 채점 vs LLM 채점의 상관계수 계산
# 0.7 이상이면 verifier가 taste를 제대로 잡고 있는 것
taste_residue_gate:
  trigger: "every_10_runs"
  correlation_threshold: 0.7
  on_drift: "alert"
